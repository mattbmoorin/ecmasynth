<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.15/Tone.js"></script>
    <title>**~~*~ECMA SYNTH~*~~**</title>
  </head>

  <style>
    #synth-container {
      position: absolute;
      height: 200px;
      border: 5px solid black;
      top: calc(50% - 100px);
      left: calc(50% - 350px);
      overflow: hidden;
    }

    .whitenote {
      height: 100%;
      width: 50px;
      background: white;
      float: left;
      border-right: 1px solid black;
      position: relative;
    }

    .blacknote {
      position: absolute;
      height: 65%;
      width: 55%;
      z-index: 1;
      background: #777;
      left: 68%;
    }
  </style>

  <body>
    <div id="synth-container"></div>
 
    <form id="synth-form">
      <label for="envelope">Attack/Release Envelope:</label><br />
      <input type="text" id="envelope" value="4n"><br />
      <label for="reverb">Reverb:</label><br />
      <input type="text" id="reverb" value="10"><br />
      <button type="button" id="reverb-button">Set</button><br />
      <label for="delay">Delay:</label><br />
      <input type="text" id="delay" value="0"><br />
      <input type="submit" value="Save Preset">
    </form>
    
    <script>
      // create synth voices
      let voice1 = new Tone.PolySynth(Tone.FMSynth).toDestination();
      let voice2 = new Tone.PolySynth(Tone.AMSynth).toDestination();
    
      const baseUrl = 'http://localhost:3000/synth'
      
      const synthForm = document.getElementById('synth-form');
      const envelopeValue = document.getElementById('envelope');
      const reverbValue = document.getElementById('reverb');
      const delayValue = document.getElementById('delay');
      
      const reverbButton = document.getElementById('reverb-button');
      
      reverbButton.addEventListener('click', setReverb);
      synthForm.addEventListener('submit', createSynth);
      
      const reverbSetting = new Tone.Reverb().toDestination();
      voice1.connect(reverbSetting);
      
      function setReverb(e) {
        reverbSetting.decay = reverbValue.value;
        console.log(reverbSetting.decay);
      }
      
      function createSynth(e) {
        e.preventDefault();
        
        let synth = {
          envelope: envelope.value,
          reverb: reverb.value,
          delay: delay.value
        };
        return fetch(baseUrl, {
          method: 'POST',
          headers: {
            'content-type': 'application/json',
            'accept': 'application/json'
          },
          body: JSON.stringify(synth)
        })
        .then(res => res.json())
      };
      
      const getSynths = () => {
        return fetch(baseUrl).then((res) => res.json());
      }
      //  create fx
      // const reverbSetting = new Tone.Reverb(reverb.value).toDestination();
      // let delaySetting = new Tone.Delay(0.5).toDestination();
      // let delay2Setting = new Tone.Delay(0.25).toDestination();
      // let vibratoSetting = new Tone.Vibrato(8.0).toDestination();
      // connect fx
      // voice1.connect(delay_setting);
      // voice2.connect(vibrato_setting);
      // voice2.connect(delay2_setting);
      // create keyboard interface
      const notes = ['C', 'D', 'E', 'F', 'G', 'A', 'B'];

      let html = '';

      for (let octave = 0; octave < 2; octave++) {
        notes.forEach((note, i) => {
          let hasSharp = true;
          let whiteNote = notes[i];

          if (whiteNote == 'E' || whiteNote == 'B') hasSharp = false;
          // can move to javascript event listeners because that's what people may tell me to do but does it really make sense here?
          // yes I understand the concept of manipulating HTML with JS but in this instance why bother? this makes everything less bloated
          // and is just as easy to read
          html += `<div class='whitenote'
      						onmousedown='noteDown(this, false)'
      						onmouseup='noteUp(this, false)'
      						onmouseleave='noteUp(this, false)'
                 	data-note='${note + (octave + 4)}'>`;

          if (hasSharp) {
            html += `<div class='blacknote'
      						onmousedown='noteDown(this, true)'
      						onmouseup='noteUp(this, true)'
      						onmouseleave='noteUp(this, true)'
                   data-note='${note + '#' + (octave + 4)}'></div>`;
          }

          html += '</div>';
        });
      }

      document.getElementById('synth-container').innerHTML = html;

      // accessing the previously declared data attribute using dataset.note
      // turning keys different colors when pressed and then back to og color on release
      function noteUp(element, isSharp) {
        element.style.background = isSharp ? '#777' : 'white';
      }

      function noteDown(element, isSharp) {
        element.style.background = isSharp ? 'black' : '#ccc';

        const note = element.dataset.note;

        // building envelope generators
        voice1.triggerAttackRelease(note, '32n');
        voice2.triggerAttackRelease(note, '32n');
        // stop propagation so accidentals dont trigger white keys
        event.stopPropagation();
      }
    </script>
  </body>
</html>
