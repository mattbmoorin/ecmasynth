<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.15/Tone.js"></script>
    <title>ECMA SYNTH</title>
  </head>

  <style>
    #synth-container {
      position: absolute;
      height: 200px;
      border: 5px solid black;
      top: calc(50% - 100px);
      left: calc(50% - 350px);
      overflow: hidden;
    }

    .whitenote {
      height: 100%;
      width: 50px;
      background: white;
      float: left;
      border-right: 1px solid rgb(0, 0, 0);
      position: relative;
    }

    .blacknote {
      position: absolute;
      height: 65%;
      width: 55%;
      z-index: 1;
      background: #777;
      left: 68%;
    }
  </style>

  <body>
    <div id="synth-container"></div>
    <div id="presets-container"></div>

    <form id="synth-form">
      <label for="envelope">Sustain:</label><br />
      <input type="text" id="envelope" value=".005"><br />
      <button type="button" id="envelope-button">Set</button><br />
      <label for="reverb">Reverb Decay Time *Cannot be 0*:</label><br />
      <input type="text" id="reverb" value="10"><br />
      <button type="button" id="reverb-button">Set</button><br />
      <label for="delay">Delay Time *Between 0 and 1*:</label><br />
      <input type="text" id="delay" value="0"><br />
      <button type="button" id="delay-button">Set</button><br />
      <input type="submit" value="Save Preset">
    </form>
    
    <script>   
      // api url
      const baseUrl = 'http://localhost:3000/synth'
      // presets container
      const presetsContainer = document.getElementById('presets-container');
      // values for sound parameters
      const synthForm = document.getElementById('synth-form');
      const envelopeValue = document.getElementById('envelope');
      const reverbValue = document.getElementById('reverb');
      const delayValue = document.getElementById('delay');
      // sound creation
      const voice1 = new Tone.PolySynth(Tone.FMSynth).toDestination();
      const voice2 = new Tone.PolySynth(Tone.AMSynth).toDestination();
      const reverbSetting = new Tone.Reverb().toDestination();
      const delaySetting = new Tone.FeedbackDelay(0, 0.5).toDestination();
      // button wiring
      const envelopeButton = document.getElementById('envelope-button');
      const reverbButton = document.getElementById('reverb-button');
      const delayButton = document.getElementById('delay-button');
      
      envelopeButton.addEventListener('click', setEnvelope);
      delayButton.addEventListener('click', setDelay);
      reverbButton.addEventListener('click', setReverb);
      synthForm.addEventListener('submit', createSynth);  
      // fx signal routing
      envelopeGenerator = envelopeValue.value;
      voice1.connect(reverbSetting);
      voice1.connect(delaySetting);

      function setEnvelope(e) {
        envelopeGenerator = envelopeValue.value;
        console.log(envelopeGenerator);
      }

      function setReverb(e) {
        reverbSetting.decay = reverbValue.value;
        console.log(reverbSetting.decay);
      }

      function setDelay(e) {
        delaySetting.delayTime.value = delayValue.value;
        console.log(delaySetting.delayTime.value);
      }
      // save presets to api
      function createSynth(e) {
        e.preventDefault();
        
        let synth = {
          envelope: envelope.value,
          reverb: reverb.value,
          delay: delay.value
        };
        return fetch(baseUrl, {
          method: 'POST',
          headers: {
            'content-type': 'application/json',
            'accept': 'application/json'
          },
          body: JSON.stringify(synth)
        })
      };
      // get presets from api
      function getSynths() {
        return fetch(baseUrl).then(res => res.json())
        .then(res => appendPresets(res))
        .catch(error => console.log(error));
      };

      function appendPresets(res) {
        console.log(res);
        
        let presetElements = (res).map(preset => {
          let li = document.createElement('li');
          li.innerText = `User Preset ${preset.id} - Sustain: ${preset.envelope}, Reverb: ${preset.reverb}, Delay: ${preset.delay}`;
          li.id = preset['id'];
          return li;
        });
        presetElements.forEach(preset => presetsContainer.append(preset));
      };
      
      getSynths();
      // create keyboard interface
      const notes = ['C', 'D', 'E', 'F', 'G', 'A', 'B'];
      
      let html = '';
      
      for (let octave = 0; octave < 2; octave++) {
        notes.forEach((note, i) => {
          let hasSharp = true;
          let whiteNote = notes[i];

          if (whiteNote == 'E' || whiteNote == 'B') hasSharp = false;
          html += `<div class='whitenote'
      						onmousedown='noteDown(this, false)'
      						onmouseup='noteUp(this, false)'
      						onmouseleave='noteUp(this, false)'
                 	data-note='${note + (octave + 4)}'>`;

          if (hasSharp) {
            html += `<div class='blacknote'
      						onmousedown='noteDown(this, true)'
      						onmouseup='noteUp(this, true)'
      						onmouseleave='noteUp(this, true)'
                   data-note='${note + '#' + (octave + 4)}'></div>`;
          }

          html += '</div>';
        });
      }

      document.getElementById('synth-container').innerHTML = html;

      // accessing the previously declared data attribute using dataset.note
      // turns keys different colors when pressed and then back to og color on release
      function noteUp(element, isSharp) {
        element.style.background = isSharp ? '#777' : 'white';
      }

      function noteDown(element, isSharp) {
        element.style.background = isSharp ? 'black' : '#ccc';

        const note = element.dataset.note;

        // building envelope generators
        voice1.triggerAttackRelease(note, `${envelopeGenerator}`);
        voice2.triggerAttackRelease(note, `${envelopeGenerator}`);
        // stop keyagation so accidentals dont trigger white keys
        event.stopkeyagation();
      }
    </script>
  </body>
</html>
